# Host configuration — edit these values, then run: host(create_agent)
trust: careful
port: 8000
workers: 1
result_ttl: 86400
relay_url: wss://oo.openonion.ai
reload: false

# File upload limits - uncomment to customize
# max_file_size: 10                 # MB per file (both WebSocket and HTTP)
# max_files_per_request: 10         # Max number of files in one request

# Auto-approve tool permissions
# Default permissions for safe read-only commands
permissions:
  # SECURITY: this whitelist auto-approves tools for BOTH remote exec (remote.call /
  # co call) and the local LLM approval flow. Do NOT add commands that can execute
  # arbitrary code (pytest/perl/npm test/python -c/node -e) or dump arbitrary file or
  # env contents (cat/head/tail/nl/grep/env/printenv) — those must fall through to a
  # human approval, never be auto-permitted. Keep to metadata / system-info commands.
  #
  # Safe read-only tools (built-in)
  "read":
    allowed: true
    source: safe
    reason: read-only operation
    expires:
      type: never

  "read_file":
    allowed: true
    source: safe
    reason: read-only operation
    expires:
      type: never

  "glob":
    allowed: true
    source: safe
    reason: read-only operation
    expires:
      type: never

  "grep":
    allowed: true
    source: safe
    reason: read-only operation
    expires:
      type: never

  "search":
    allowed: true
    source: safe
    reason: read-only operation
    expires:
      type: never

  "list_files":
    allowed: true
    source: safe
    reason: read-only operation
    expires:
      type: never

  "get_file_info":
    allowed: true
    source: safe
    reason: read-only operation
    expires:
      type: never

  "task":
    allowed: true
    source: safe
    reason: sub-agents handle own approval
    expires:
      type: never

  "load_guide":
    allowed: true
    source: safe
    reason: read-only operation
    expires:
      type: never

  "enter_plan_mode":
    allowed: true
    source: safe
    reason: planning mode
    expires:
      type: never

  "task_output":
    allowed: true
    source: safe
    reason: read-only operation
    expires:
      type: never

  "ask_user":
    allowed: true
    source: safe
    reason: user interaction
    expires:
      type: never

  # co CLI — the framework's own commands (status, auth, browser, ...). Safe to
  # run directly; they operate on this project's own .co config and identity.
  #
  # This is ALSO the browser remote-control entry point. `co browser <verb>`
  # drives the persistent browser DAEMON (a separate process that arbitrates
  # tabs, ownership, and lifecycle itself), so a remote client steers the
  # browser with RemoteAgent.call("bash", command="co browser take_screenshot").
  # Do NOT whitelist the in-process browser tool names (go_to, take_screenshot,
  # ...) for direct exec: those bypass the daemon's tab arbitration and the
  # per-session tab binding, and hit the purpose/who guard meant for the AI.
  # The two stacks are different Chrome instances sharing one profile — see
  # docs/network/remote-call.md ("Driving a browser").
  "Bash(co *)":
    allowed: true
    source: config
    reason: safe - connectonion CLI
    expires:
      type: never

