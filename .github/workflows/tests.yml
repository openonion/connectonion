name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov pytest-mock pytest-asyncio psutil

      - name: Run all tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENONION_API_KEY: ${{ secrets.OPENONION_API_KEY }}
        run: |
          pytest tests/ -v --tb=short -m "not slow and not real_api and not network"

  # Validate the native Windows browser IPC (named-pipe daemon transport) — the
  # `co browser` daemon uses Unix sockets on POSIX and Windows named pipes here.
  # These tests use a StubBrowser, so no Chrome/network is needed; they exercise the
  # real cross-platform transport (multiprocessing.connection + HMAC authkey).
  windows-browser:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-mock pytest-asyncio

      - name: Run browser transport + daemon tests (native Windows named pipes)
        run: |
          pytest tests/unit/test_transport.py tests/e2e/cli/test_browser_daemon.py -v --tb=short

  # Simulate a REAL Windows user end-to-end: install from the wheel (exactly what
  # PyPI ships — not an editable checkout), discover the CLI from the shell, run the
  # documented patchright step, exercise paths with spaces + non-ASCII characters,
  # then drive a REAL Chrome through `co browser` (daemon spawn → named pipe →
  # launch → navigate → close). This is the "it installs but co/patchright won't
  # run on my machine" class of failure, caught before release.
  windows-e2e:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build the wheel (what PyPI ships)
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Install from the wheel like a real user (not editable)
        run: |
          $whl = (Get-ChildItem dist\*.whl | Select-Object -First 1).FullName
          pip install $whl
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: CLI is discoverable from a plain shell
        run: |
          co --version
          if ($LASTEXITCODE -ne 0) { Write-Error "co not on PATH after pip install"; exit 1 }
          python -m connectonion.cli.main --version
          if ($LASTEXITCODE -ne 0) { exit 1 }
          co doctor
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: CLI works from cmd.exe too (not just PowerShell)
        shell: cmd
        run: |
          co --version || exit /b 1
          python -m connectonion.cli.main --version || exit /b 1

      - name: First run OFFLINE is graceful — no traceback, scaffold still created
        env:
          # A dead proxy makes every backend call fail fast, deterministically —
          # this is the fresh Windows laptop on hotel wifi. Isolated USERPROFILE =
          # a true first run (keypair generation included).
          HTTP_PROXY: http://127.0.0.1:9
          HTTPS_PROXY: http://127.0.0.1:9
          USERPROFILE: ${{ runner.temp }}\co-first-run-home
        run: |
          New-Item -ItemType Directory -Path $env:USERPROFILE -Force | Out-Null
          $dir = Join-Path $env:RUNNER_TEMP "co-first-run-project"
          New-Item -ItemType Directory -Path $dir -Force | Out-Null
          Set-Location $dir
          $out = co init --yes 2>&1 | Out-String
          Write-Host $out
          if ($LASTEXITCODE -ne 0) { Write-Error "offline first run exited $LASTEXITCODE"; exit 1 }
          if ($out -match "Traceback") { Write-Error "offline first run printed a traceback"; exit 1 }
          if (!(Test-Path ".co")) { Write-Error "offline first run did not scaffold .co/"; exit 1 }
          if (!(Test-Path (Join-Path $env:USERPROFILE ".co\keys\agent.key"))) {
            Write-Error "keypair was not created on first run"; exit 1
          }

      - name: patchright CLI runs and can install a browser (the documented user step)
        run: |
          python -m patchright --version
          if ($LASTEXITCODE -ne 0) { Write-Error "patchright module not runnable"; exit 1 }
          # Retry once: this downloads a browser and can flake on network hiccups.
          python -m patchright install chrome
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "patchright install chrome failed once - retrying"
            python -m patchright install chrome
            if ($LASTEXITCODE -ne 0) { exit 1 }
          }

      - name: Package data survives the wheel — skills copy in a path with spaces + CJK
        run: |
          $dir = Join-Path $env:RUNNER_TEMP "co test 测试 dir"
          New-Item -ItemType Directory -Path $dir -Force | Out-Null
          Set-Location $dir
          co copy install-connectonion
          if ($LASTEXITCODE -ne 0) { exit 1 }
          if (!(Test-Path ".co/skills/install-connectonion/SKILL.md")) {
            Write-Error "SKILL.md missing after co copy - package data broken on Windows"
            exit 1
          }
          co copy --list
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Real co browser end-to-end — daemon spawn, named pipe, Chrome, navigation
        run: |
          # A local file:// page keeps this hermetic (no external network flake).
          Set-Content -Path test.html -Value "<html><body><h1>co-windows-e2e</h1></body></html>"
          $url = "file:///" + ($PWD.Path -replace '\\','/') + "/test.html"

          co browser --headless go_to $url
          if ($LASTEXITCODE -ne 0) { Write-Error "go_to failed - Chrome did not launch/navigate"; exit 1 }

          $status = co browser status | Out-String
          Write-Host $status
          if ($status -notmatch "Browser: open") { Write-Error "daemon does not report an open browser"; exit 1 }

          $cur = co browser get_current_url | Out-String
          Write-Host $cur
          if ($cur -notmatch "test.html") { Write-Error "navigation did not land on the test page"; exit 1 }

          co browser close
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Parallel agents — three tabs opened concurrently (multi-agent contention)
        run: |
          co browser --headless go_to about:blank
          if ($LASTEXITCODE -ne 0) { Write-Error "daemon cold-start failed"; exit 1 }

          $jobs = 1..3 | ForEach-Object {
            Start-Job -ScriptBlock {
              param($i)
              $o = co browser newtab --who=agent$i --purpose=parallel-$i 2>&1 | Out-String
              [pscustomobject]@{ Code = $LASTEXITCODE; Out = $o }
            } -ArgumentList $_
          }
          $results = $jobs | Wait-Job -Timeout 180 | Receive-Job
          $jobs | Remove-Job -Force
          foreach ($r in $results) { Write-Host $r.Out }
          if (@($results).Count -ne 3) { Write-Error "not all parallel newtab jobs finished"; exit 1 }
          foreach ($r in $results) {
            if ($r.Code -ne 0) { Write-Error "a parallel newtab failed under contention"; exit 1 }
          }

          $status = co browser status | Out-String
          Write-Host $status
          foreach ($who in "agent1", "agent2", "agent3") {
            if ($status -notmatch $who) { Write-Error "status is missing $who's tab"; exit 1 }
          }
          co browser close
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Second run — warm daemon lifecycle (spawn again after close)
        run: |
          co browser --headless go_to about:blank
          if ($LASTEXITCODE -ne 0) { Write-Error "second daemon cold-start failed"; exit 1 }
          co browser close
          if ($LASTEXITCODE -ne 0) { exit 1 }

      # THE fresh-Windows-laptop test: no system Chrome anywhere, empty browsers dir.
      # The first page-driving command must auto-install a browser (real download,
      # no admin rights involved — chromium goes to the per-user browsers path) and
      # then actually drive it. This is the exact first-experience a new Windows
      # user gets on a machine without Chrome.
      - name: Fresh laptop — auto-install fires for real (no system Chrome, empty browsers dir)
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}\fresh-browsers
        run: |
          Stop-Process -Name chrome -Force -ErrorAction SilentlyContinue
          Rename-Item "C:\Program Files\Google" "C:\Program Files\GoogleHidden"
          if (!(Test-Path "C:\Program Files\GoogleHidden")) { Write-Error "could not hide system Chrome"; exit 1 }
          New-Item -ItemType Directory -Path $env:PLAYWRIGHT_BROWSERS_PATH -Force | Out-Null

          Set-Content -Path fresh.html -Value "<html><body><h1>fresh-laptop</h1></body></html>"
          $url = "file:///" + ($PWD.Path -replace '\\','/') + "/fresh.html"
          $out = co browser --headless go_to $url 2>&1 | Out-String
          Write-Host $out
          if ($LASTEXITCODE -ne 0) { Write-Error "auto-install path failed to launch/navigate"; exit 1 }
          if ($out -notmatch "one-time download") { Write-Error "auto-install did not announce itself"; exit 1 }
          if ($out -notmatch "Navigated to") { Write-Error "navigation missing after auto-install"; exit 1 }

          $cur = co browser get_current_url | Out-String
          if ($cur -notmatch "fresh.html") { Write-Error "wrong page after auto-install launch"; exit 1 }
          co browser close
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Restore system Chrome (cleanup for the fresh-laptop test)
        if: always()
        run: |
          if (Test-Path "C:\Program Files\GoogleHidden") {
            Rename-Item "C:\Program Files\GoogleHidden" "C:\Program Files\Google"
          }

      - name: CLI works from Windows PowerShell 5.1 (many users' default shell)
        shell: powershell
        run: |
          co --version
          if ($LASTEXITCODE -ne 0) { Write-Error "co failed under PowerShell 5.1"; exit 1 }
          co doctor
          if ($LASTEXITCODE -ne 0) { exit 1 }

      # The classic Chinese-Windows-user minefield: the ENTIRE home lives under a
      # path with CJK characters and a space. keys.env, the keypair, browser
      # sidecars/authkey (LOCALAPPDATA), the Chrome profile dir — all of it.
      - name: Everything works with a CJK + space home directory
        env:
          USERPROFILE: ${{ runner.temp }}\co 用户 目录
          LOCALAPPDATA: ${{ runner.temp }}\co 用户 目录\AppData\Local
          HTTP_PROXY: http://127.0.0.1:9
          HTTPS_PROXY: http://127.0.0.1:9
        run: |
          New-Item -ItemType Directory -Path $env:LOCALAPPDATA -Force | Out-Null
          $proj = Join-Path $env:USERPROFILE "我的 项目"
          New-Item -ItemType Directory -Path $proj -Force | Out-Null
          Set-Location $proj

          $out = co init --yes 2>&1 | Out-String
          if ($LASTEXITCODE -ne 0 -or $out -match "Traceback") { Write-Host $out; Write-Error "init failed in CJK home"; exit 1 }
          if (!(Test-Path (Join-Path $env:USERPROFILE ".co\keys\agent.key"))) { Write-Error "keypair missing under CJK home"; exit 1 }

          # Idempotency: a second init must not corrupt the project.
          $out2 = co init --yes --force 2>&1 | Out-String
          if ($LASTEXITCODE -ne 0 -or $out2 -match "Traceback") { Write-Host $out2; Write-Error "second init corrupted the project"; exit 1 }
          if (!(Test-Path ".env")) { Write-Error ".env lost on re-init"; exit 1 }

          co copy install-connectonion
          if ($LASTEXITCODE -ne 0) { Write-Error "co copy failed in CJK home"; exit 1 }

          # Real browser with profile + sidecars + authkey all under the CJK home.
          Set-Content -Path page.html -Value "<html><body>cjk-home</body></html>"
          $url = "file:///" + ($PWD.Path -replace '\\','/') + "/page.html"
          co browser --headless go_to $url
          if ($LASTEXITCODE -ne 0) { Write-Error "browser failed with CJK home"; exit 1 }
          co browser close
          if ($LASTEXITCODE -ne 0) { exit 1 }

      # The GBK/cp936 minefield (issue #230): a Chinese Windows console runs in the
      # legacy GBK codepage. Before the fix, the co_ai/shell subprocess layer used
      # text=True with NO explicit encoding, so a child that emitted UTF-8/emoji
      # crashed the reader thread (UnicodeDecodeError) or the child itself
      # (UnicodeEncodeError). Force the console into GBK and turn OFF Python's UTF-8
      # mode so the legacy codepage is actually in effect, then drive the *shipped*
      # Shell + background runner through a child that prints CJK + an emoji and
      # assert it round-trips cleanly.
      - name: Subprocess tools survive the Chinese (GBK/cp936) console codepage
        shell: pwsh
        env:
          PYTHONUTF8: "0"
        run: |
          chcp 936
          @'
          import sys, time
          from connectonion.useful_tools.shell import Shell
          from connectonion.cli.co_ai.tools import background as bg

          cps = [20013, 25991, 27979, 35797, 128640]   # CJK chars + a rocket emoji
          want = "".join(chr(c) for c in cps)
          # Build the child from codepoints so the command line stays pure ASCII;
          # the child generates the Unicode itself and prints it (UTF-8 thanks to the
          # env the Shell/background runner inject).
          inner = "print(''.join(chr(c) for c in %s))" % cps
          child = '"%s" -c "%s"' % (sys.executable, inner)

          out = Shell().run(child)
          assert want in out, "Shell lost unicode under GBK console: %r" % out

          bg.run_background(child)
          for _ in range(100):
              t = bg._tasks.get("bg_1")
              if t and t.status != bg.TaskStatus.RUNNING:
                  break
              time.sleep(0.1)
          o2 = bg.task_output("bg_1")
          assert want in o2, "background lost unicode under GBK console: %r" % o2
          print("OK: GBK/cp936 console subprocess round-trip clean")
          '@ | Set-Content -Path gbk_check.py -Encoding ascii
          python gbk_check.py
          if ($LASTEXITCODE -ne 0) { Write-Error "GBK/cp936 subprocess round-trip failed"; exit 1 }

      # Task-Manager-kill recovery: a stale pid file whose pid now belongs to a
      # LIVE unrelated process must never block a fresh daemon (the pre-fix
      # behavior was a permanent 'daemon is busy' denial of service).
      - name: Stale pid file with a recycled live pid cannot brick the daemon
        run: |
          $pidfile = python -c "from connectonion.cli.browser_agent import transport, daemon as d; print(transport.pid_path(d.default_sock_path()))"
          Get-CimInstance Win32_Process -Filter "Name='python.exe'" |
            Where-Object { $_.CommandLine -match "browser_agent.daemon" } |
            ForEach-Object { Stop-Process -Id $_.ProcessId -Force -ErrorAction SilentlyContinue }
          Start-Sleep -Seconds 1
          $decoy = Start-Process notepad -PassThru -WindowStyle Hidden
          New-Item -ItemType Directory -Path (Split-Path $pidfile) -Force | Out-Null
          Set-Content -Path $pidfile -Value $decoy.Id -NoNewline

          co browser status
          $code = $LASTEXITCODE
          Stop-Process -Id $decoy.Id -Force -ErrorAction SilentlyContinue
          if ($code -ne 0) { Write-Error "stale pid file blocked the daemon (exit $code)"; exit 1 }
          co browser close

      # Corrupt authkey heals itself: a truncated key file (crashed writer) must
      # not brick the CLI — the next command replaces it atomically and works.
      - name: Corrupt authkey self-heals
        run: |
          Get-CimInstance Win32_Process -Filter "Name='python.exe'" |
            Where-Object { $_.CommandLine -match "browser_agent.daemon" } |
            ForEach-Object { Stop-Process -Id $_.ProcessId -Force -ErrorAction SilentlyContinue }
          Start-Sleep -Seconds 1
          $auth = Join-Path $env:LOCALAPPDATA "co\authkey"
          New-Item -ItemType Directory -Path (Split-Path $auth) -Force | Out-Null
          Set-Content -Path $auth -Value "xx" -NoNewline

          co browser status
          if ($LASTEXITCODE -ne 0) { Write-Error "corrupt authkey bricked the CLI"; exit 1 }
          $len = (Get-Item $auth).Length
          if ($len -lt 16) { Write-Error "authkey was not healed (length $len)"; exit 1 }
          co browser close

      - name: Show the browser daemon log on failure
        if: failure()
        run: |
          $log = Join-Path $env:USERPROFILE ".co\browser.log"
          if (Test-Path $log) { Get-Content $log } else { Write-Host "no browser.log" }
